name: Release to npm

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to (re-)release, e.g. v0.0.1"
        required: true
        type: string

jobs:
  prepare:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{ steps.derive.outputs.version }}
      tag: ${{ steps.derive.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.10.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Derive version from tag
        id: derive
        run: |
          REF="${{ inputs.tag || github.ref_name }}"
          VERSION="${REF#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${REF}"        >> "$GITHUB_OUTPUT"
          echo "Releasing ${REF} (version ${VERSION})"

      - name: Verify package versions match tag
        env:
          VERSION: ${{ steps.derive.outputs.version }}
        run: |
          for pkg in packages/*/package.json; do
            actual=$(node -p "require('./${pkg}').version")
            if [ "$actual" != "$VERSION" ]; then
              echo "::error file=${pkg}::version mismatch — package=${actual} tag=${VERSION}"
              exit 1
            fi
          done

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Verify package contents
        run: pnpm -r --filter "./packages/*" exec npm pack --dry-run

      - name: Pre-flight — report already-published packages
        env:
          VERSION: ${{ steps.derive.outputs.version }}
        run: |
          for pkg in \
            @conduit-harness/conduit \
            @conduit-harness/conduit-tracker-github \
            @conduit-harness/conduit-tracker-linear \
            @conduit-harness/conduit-tracker-gitlab \
            @conduit-harness/conduit-tracker-jira \
            @conduit-harness/conduit-runner-claude-cli \
            @conduit-harness/conduit-runner-codex-cli \
            @conduit-harness/conduit-runner-openai-api; do
            if ( npm view "${pkg}@${VERSION}" version 2>/dev/null || true ) | grep -qF "${VERSION}"; then
              echo "  ${pkg}@${VERSION} — already on npm, will be skipped"
            else
              echo "  ${pkg}@${VERSION} — not yet published, will be published"
            fi
          done

      - name: Trusted Publisher checklist
        run: |
          {
            echo "## Trusted Publisher checklist"
            echo
            echo "Each package below must have this repo + workflow configured as a Trusted Publisher on npmjs.com."
            echo "If a publish step later fails with 401/403, open the link and configure it (repo: \`conduit-harness/conduit\`, workflow: \`release.yml\`, environment blank), then re-run."
            echo
            for pkg in \
              @conduit-harness/conduit \
              @conduit-harness/conduit-tracker-github \
              @conduit-harness/conduit-tracker-linear \
              @conduit-harness/conduit-tracker-gitlab \
              @conduit-harness/conduit-tracker-jira \
              @conduit-harness/conduit-runner-claude-cli \
              @conduit-harness/conduit-runner-codex-cli \
              @conduit-harness/conduit-runner-openai-api; do
              echo "- [ ] [${pkg}](https://www.npmjs.com/package/${pkg}/access)"
            done
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Tar built packages
        run: |
          tar \
            --exclude='packages/*/node_modules' \
            --exclude='packages/*/src' \
            --exclude='packages/*/test' \
            --exclude='packages/*/tsconfig*.json' \
            -czf built-packages.tar.gz packages

      - name: Upload built packages
        uses: actions/upload-artifact@v4
        with:
          name: built-packages
          path: built-packages.tar.gz
          retention-days: 7

  publish:
    needs: prepare
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      VERSION: ${{ needs.prepare.outputs.version }}
    strategy:
      fail-fast: false
      matrix:
        package:
          - { name: "@conduit-harness/conduit",                   dir: "packages/conduit" }
          - { name: "@conduit-harness/conduit-tracker-github",    dir: "packages/conduit-tracker-github" }
          - { name: "@conduit-harness/conduit-tracker-linear",    dir: "packages/conduit-tracker-linear" }
          - { name: "@conduit-harness/conduit-tracker-gitlab",    dir: "packages/conduit-tracker-gitlab" }
          - { name: "@conduit-harness/conduit-tracker-jira",      dir: "packages/conduit-tracker-jira" }
          - { name: "@conduit-harness/conduit-runner-claude-cli", dir: "packages/conduit-runner-claude-cli" }
          - { name: "@conduit-harness/conduit-runner-codex-cli",  dir: "packages/conduit-runner-codex-cli" }
          - { name: "@conduit-harness/conduit-runner-openai-api", dir: "packages/conduit-runner-openai-api" }
    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Download built packages
        uses: actions/download-artifact@v4
        with:
          name: built-packages

      - name: Extract built packages
        run: tar -xzf built-packages.tar.gz

      - name: Publish ${{ matrix.package.name }}
        env:
          NPM_CONFIG_PROVENANCE: "true"
        run: |
          set -o pipefail
          if ( npm view "${{ matrix.package.name }}@${VERSION}" version 2>/dev/null || true ) | grep -qF "${VERSION}"; then
            echo "Already published, skipping"
            exit 0
          fi
          cd "${{ matrix.package.dir }}"
          output=$(npm publish --access public --provenance 2>&1) && code=0 || code=$?
          echo "$output"
          if [ "${code:-0}" -ne 0 ] && echo "$output" | grep -qE "E409|already exists|previously published"; then
            echo "Already published (race), skipping"
            exit 0
          fi
          exit "${code:-0}"

  release:
    needs: [prepare, publish]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      VERSION: ${{ needs.prepare.outputs.version }}
      TAG: ${{ needs.prepare.outputs.tag }}
    steps:
      - name: Post-publish visibility check (warning only)
        run: |
          for pkg in \
            @conduit-harness/conduit \
            @conduit-harness/conduit-tracker-github \
            @conduit-harness/conduit-tracker-linear \
            @conduit-harness/conduit-tracker-gitlab \
            @conduit-harness/conduit-tracker-jira \
            @conduit-harness/conduit-runner-claude-cli \
            @conduit-harness/conduit-runner-codex-cli \
            @conduit-harness/conduit-runner-openai-api; do
            if ( npm view "${pkg}@${VERSION}" version 2>/dev/null || true ) | grep -qF "${VERSION}"; then
              echo "  ${pkg}@${VERSION} visible on npm"
            else
              echo "::warning::${pkg}@${VERSION} not yet visible on npm (registry may still be propagating)"
            fi
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          name: ${{ env.TAG }}
          generate_release_notes: true
